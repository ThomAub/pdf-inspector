name: Publish npm package

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            napi/target/
          key: ${{ runner.os }}-cargo-napi-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-napi-

      - name: Install dependencies
        working-directory: napi
        run: bun install

      - name: Build native addon
        working-directory: napi
        run: bunx napi build --platform --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: napi/*.node
          if-no-files-found: error

  publish:
    name: Publish to GitHub Packages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: napi
        run: bun install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: napi/artifacts

      - name: Prepare and publish
        working-directory: napi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > .npmrc
          echo "@firecrawl:registry=https://npm.pkg.github.com" >> .npmrc

          # Create platform package dirs expected by napi artifacts
          mkdir -p npm/linux-x64-gnu npm/darwin-arm64

          # Move binaries into platform dirs
          bunx napi artifacts --build-output-dir artifacts

          # Generate platform package.json files
          bunx napi prepublish -t npm --skip-gh-release

          echo "=== Package contents ==="
          ls -R npm/

          # Publish platform packages first, then main package
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Publishing $dir"
              (cd "$dir" && npm publish --access public) || true
            fi
          done
          echo "Publishing main package"
          npm publish --access public || true
